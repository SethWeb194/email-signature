<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>Email Signature</title>
  <style>
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }

    /* Targets dark mode for modern clients */
    @media (prefers-color-scheme: dark) {
      .dark-name {
        color: #ffffff !important;
      }
    }

    /* Extra support for Outlook app dark mode */
    [data-ogsc] .dark-name {
      color: #ffffff !important;
    }
  </style>
</head>
<body>

<div>
    <table width="100%" cellspacing="0" cellpadding="0" border="0" style="padding:20px; font-family: Arial, sans-serif;">
        <tr>
            <td align="left">
                <table cellspacing="0" cellpadding="0" border="0">
                    <tr>
                        <td width="160" valign="middle">
                            <img src="https://SethWeb194.github.io/email-signature/Logo-transparent.png" alt="7 Logo" width="140" style="display:block; border:0;">
                        </td>

                        <td valign="middle" style="font-size:14px;">
                            <p class="dark-name" style="font-size:18px; margin:0 0 4px 0; font-weight: bold; color:#333333;">
                                Seth Duku
                            </p>
                            <p style="margin:0;">
                                <a href="https://sethduku.com/" target="_blank" style="color:#007bff; text-decoration: underline; font-size:16px;">
                                    sethduku.com
                                </a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
